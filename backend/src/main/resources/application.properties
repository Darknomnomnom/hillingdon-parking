# Server
server.port=${PORT:8080}

# PostgreSQL / Supabase
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Email (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File uploads (Blue Badge photos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AWS S3 (Blue Badge photo storage)
app.aws.bucket-name=${AWS_S3_BUCKET:hillingdon-parking-poc}
app.aws.region=${AWS_REGION:eu-west-2}

# Quartz
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# CORS — allow Vercel frontend
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ANPR simulator (set to false in local dev, true on Railway for demo)
app.anpr.simulator.enabled=${ANPR_SIMULATOR_ENABLED:true}

# Logging
logging.level.com.hillingdon=DEBUG
logging.level.org.springframework.security=INFO
